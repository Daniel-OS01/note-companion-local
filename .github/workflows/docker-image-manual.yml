name: Docker Image — Self-Host Publish

# =============================================================================
# MANUAL-ONLY workflow. Never triggers on push or pull_request.
# You control exactly when an image is published and what version it gets.
# =============================================================================

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (semver, e.g. v1.2.3). The only tag that will be pushed.'
        required: true
        type: string
      tag_latest:
        description: 'Also push this image as :latest? Only do this for stable releases.'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
      platforms:
        description: 'Target platforms. Oracle Cloud standard = linux/amd64.'
        required: false
        default: 'linux/amd64'
        type: string

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

permissions:
  contents: read
  packages: write
  attestations: write
  id-token: write

jobs:
  publish:
    name: Build & publish self-hosted image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # -----------------------------------------------------------------------
      # Validate semver before doing any expensive work.
      # Accepts: v1.2.3  v1.2.3-rc.1  v1.2.3+build.42
      # Rejects anything that isn't a proper version string.
      # -----------------------------------------------------------------------
      - name: Validate version input
        id: validate
        shell: bash
        run: |
          VERSION="${{ github.event.inputs.version }}"
          if [[ ! "$VERSION" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([\-+][A-Za-z0-9._-]+)?$ ]]; then
            echo "::error::Version '$VERSION' is not valid semver. Example: v1.2.3"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Version is valid: $VERSION"

      # -----------------------------------------------------------------------
      # Fix "exec /usr/local/bin/docker-entrypoint.sh: exec format error"
      #
      # This error almost always means one of two things:
      #   1. The script has Windows \r\n line endings, which corrupts the
      #      shebang line (#!/bin/sh becomes #!/bin/sh\r and Linux rejects it).
      #   2. The executable bit is missing (git sometimes strips it).
      #
      # We strip \r and chmod +x every .sh file we find in the repo.
      # This runs BEFORE the Docker build, so the files are clean when
      # Docker copies them into the image.
      # -----------------------------------------------------------------------
      - name: Normalize shell scripts (fix exec format error)
        shell: bash
        run: |
          echo "Scanning for shell scripts to normalize..."
          found=false
          while IFS= read -r -d $'\0' f; do
            found=true
            sed -i 's/\r$//' "$f" || true
            chmod +x "$f" || true
            echo "  Normalized: $f"
          done < <(find . \
            -not -path './.git/*' \
            -type f \
            \( -name '*.sh' -o -name 'entrypoint' -o -name 'docker-entrypoint*' \) \
            -print0)
          if [ "$found" = "false" ]; then
            echo "No shell scripts found — nothing to normalize."
          fi

      # -----------------------------------------------------------------------
      # Buildx is the modern Docker build engine. Required even for single-arch
      # builds because it supports BuildKit features like layer caching.
      # No QEMU needed here since we're only targeting linux/amd64 (Oracle).
      # -----------------------------------------------------------------------
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # -----------------------------------------------------------------------
      # Emit only the explicit version tag (and optionally :latest).
      # We deliberately never emit branch/sha/pr tags from a manual workflow —
      # those are for the CI workflow. Here you want clean, intentional versions.
      # -----------------------------------------------------------------------
      - name: Extract metadata (tags & labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ steps.validate.outputs.version }}
            type=raw,value=latest,enable=${{ github.event.inputs.tag_latest == 'true' }}

      - name: Show tags that will be pushed
        run: printf '%s\n' "${{ steps.meta.outputs.tags }}"

      # -----------------------------------------------------------------------
      # Build the image using whatever Dockerfile exists in the repo root.
      # The GHA cache backend means unchanged layers (deps, build tools) are
      # restored from cache rather than rebuilt — saves 5-10 min on warm runs.
      # provenance=false avoids a second attestation manifest that can confuse
      # older container runtimes; we generate it ourselves in the next step.
      # -----------------------------------------------------------------------
      - name: Build and push Docker image
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: ${{ github.event.inputs.platforms }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Signed provenance attestation — links the image digest back to this
      # exact workflow run so anyone can verify where the image came from.
      - name: Generate artifact attestation
        if: ${{ steps.push.outputs.digest != '' }}
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

      # Human-readable summary shown in the Actions UI after the run.
      - name: Write job summary
        if: ${{ steps.push.outputs.digest != '' }}
        run: |
          echo "## Docker image published" >> "$GITHUB_STEP_SUMMARY"
          echo "| Field | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Version** | \`${{ steps.validate.outputs.version }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Latest tagged** | \`${{ github.event.inputs.tag_latest }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Digest** | \`${{ steps.push.outputs.digest }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Image** | \`${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "\`\`\`bash" >> "$GITHUB_STEP_SUMMARY"
          echo "docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.validate.outputs.version }}" >> "$GITHUB_STEP_SUMMARY"
          echo "\`\`\`" >> "$GITHUB_STEP_SUMMARY"
