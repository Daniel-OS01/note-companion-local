name: Docker Image — Self-Host Publish

# =============================================================================
# MANUAL-ONLY workflow. Never triggers on push or pull_request.
# You control exactly when an image is published and what version it gets.
# =============================================================================

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (semver, e.g. v1.2.3). The only tag that will be pushed.'
        required: true
        type: string
      tag_latest:
        description: 'Also push this image as :latest? Only do this for stable releases.'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
      platforms:
        description: 'Target platforms. Oracle Cloud standard = linux/amd64.'
        required: false
        default: 'linux/amd64'
        type: string

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

permissions:
  contents: read
  packages: write
  attestations: write
  id-token: write

jobs:
  publish:
    name: Build & publish self-hosted image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # -----------------------------------------------------------------------
      # Validate semver before doing any expensive work.
      # Accepts: v1.2.3  v1.2.3-rc.1  v1.2.3+build.42
      # -----------------------------------------------------------------------
      - name: Validate version input
        id: validate
        shell: bash
        run: |
          VERSION="${{ github.event.inputs.version }}"
          if [[ ! "$VERSION" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([\-+][A-Za-z0-9._-]+)?$ ]]; then
            echo "::error::Version '$VERSION' is not valid semver. Example: v1.2.3"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Version is valid: $VERSION"

      # -----------------------------------------------------------------------
      # Fix "exec /usr/local/bin/docker-entrypoint.sh: exec format error"
      # Strips Windows \r line endings and ensures .sh files are executable,
      # running BEFORE the Docker build so files are clean when copied in.
      # -----------------------------------------------------------------------
      - name: Normalize shell scripts (fix exec format error)
        shell: bash
        run: |
          echo "Scanning for shell scripts to normalize..."
          found=false
          while IFS= read -r -d $'\0' f; do
            found=true
            sed -i 's/\r$//' "$f" || true
            chmod +x "$f" || true
            echo "  Normalized: $f"
          done < <(find . \
            -not -path './.git/*' \
            -type f \
            \( -name '*.sh' -o -name 'entrypoint' -o -name 'docker-entrypoint*' \) \
            -print0)
          if [ "$found" = "false" ]; then
            echo "No shell scripts found — nothing to normalize."
          fi

      # -----------------------------------------------------------------------
      # Buildx is the modern Docker build engine. Required for BuildKit caching
      # even when targeting only a single architecture.
      # -----------------------------------------------------------------------
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # -----------------------------------------------------------------------
      # Emit only the explicit version tag (and optionally :latest).
      # -----------------------------------------------------------------------
      - name: Extract metadata (tags & labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ steps.validate.outputs.version }}
            type=raw,value=latest,enable=${{ github.event.inputs.tag_latest == 'true' }}

      - name: Show tags that will be pushed
        run: printf '%s\n' "${{ steps.meta.outputs.tags }}"

      # -----------------------------------------------------------------------
      # Build and push — with retry logic.
      #
      # WHY THE RETRY EXISTS:
      #   The previous failure was:
      #     "error writing layer blob: failed to parse error response 502"
      #   This is a transient GitHub Container Registry (ghcr.io) error —
      #   their "Unicorn" page, served when their infrastructure has a brief
      #   hiccup. The build itself completed successfully in 5m1s; the push
      #   failed because ghcr.io returned HTTP 502 while Docker was uploading
      #   a layer blob. Without retry logic, the entire workflow has to be
      #   re-triggered manually.
      #
      # HOW THE RETRY WORKS:
      #   We use a bash loop that runs the build+push up to 3 times with a
      #   30-second pause between attempts. We use the native bash loop rather
      #   than a third-party retry action so there are no extra dependencies.
      #   On attempt 2+, the GHA cache (cache-from: type=gha) means all layers
      #   that were successfully built on attempt 1 are restored instantly —
      #   only the failed push is retried, not a full 5-minute rebuild.
      #
      # WHY provenance=false:
      #   Without it, docker/build-push-action pushes a second manifest
      #   containing an in-line SLSA provenance attestation. This second
      #   manifest is in a format that confuses some older container runtimes
      #   (including older Dokploy/Portainer versions). We disable it here and
      #   generate our own clean attestation in the explicit step below.
      # -----------------------------------------------------------------------
      - name: Build and push Docker image (with retry)
        id: push
        shell: bash
        env:
          TAGS: ${{ steps.meta.outputs.tags }}
          LABELS: ${{ steps.meta.outputs.labels }}
          PLATFORMS: ${{ github.event.inputs.platforms }}
        run: |
          MAX_ATTEMPTS=3
          DELAY=30

          for attempt in $(seq 1 $MAX_ATTEMPTS); do
            echo "::group::Build & push attempt $attempt of $MAX_ATTEMPTS"

            # Run the build-push-action equivalent via the docker buildx CLI.
            # We call buildx directly in the retry loop because the action
            # wrapper cannot be re-invoked inside a bash loop.
            if docker buildx build \
                --platform "$PLATFORMS" \
                --provenance=false \
                --cache-from "type=gha" \
                --cache-to "type=gha,mode=max" \
                $(echo "$TAGS"   | sed 's/^/--tag /;s/\n/ --tag /g' | tr '\n' ' ') \
                $(echo "$LABELS" | sed 's/^/--label /;s/\n/ --label /g' | tr '\n' ' ') \
                --push \
                --file ./Dockerfile \
                . 2>&1 | tee /tmp/build_output.txt; then
              echo "::endgroup::"
              echo "Push succeeded on attempt $attempt."

              # Extract the image digest from the build output so the
              # attestation step below has something to sign.
              DIGEST=$(grep -oP 'sha256:[a-f0-9]{64}' /tmp/build_output.txt | tail -1 || true)
              echo "digest=$DIGEST" >> "$GITHUB_OUTPUT"
              exit 0
            fi

            echo "::endgroup::"
            echo "::warning::Attempt $attempt failed."

            if [ "$attempt" -lt "$MAX_ATTEMPTS" ]; then
              echo "Waiting ${DELAY}s before retry..."
              sleep $DELAY
              # Increase delay for next attempt (exponential back-off)
              DELAY=$((DELAY * 2))
            fi
          done

          echo "::error::All $MAX_ATTEMPTS push attempts failed. Check the ghcr.io status page."
          exit 1

      # -----------------------------------------------------------------------
      # Signed provenance attestation — links the image digest back to this
      # exact workflow run so anyone can verify where the image came from.
      # Only runs when the push step actually produced a digest.
      # -----------------------------------------------------------------------
      - name: Generate artifact attestation
        if: ${{ steps.push.outputs.digest != '' }}
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

      # Human-readable summary shown in the Actions UI after the run.
      - name: Write job summary
        if: ${{ steps.push.outputs.digest != '' }}
        run: |
          echo "## Docker image published" >> "$GITHUB_STEP_SUMMARY"
          echo "| Field | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Version** | \`${{ steps.validate.outputs.version }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Latest tagged** | \`${{ github.event.inputs.tag_latest }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Digest** | \`${{ steps.push.outputs.digest }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| **Image** | \`${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "\`\`\`bash" >> "$GITHUB_STEP_SUMMARY"
          echo "docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.validate.outputs.version }}" >> "$GITHUB_STEP_SUMMARY"
          echo "\`\`\`" >> "$GITHUB_STEP_SUMMARY"

